<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        padding-top: 100px;
        background-color: #629fad;
      }

      .header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 20px 10%;
        background-color: #ededce;
        display: flex;
        gap: 20px;
        justify-content: space-between;
        align-items: center;
      }

      #logo {
        text-decoration: none;
        font-size: 25px;
        font-weight: bold;
        color: rgb(112, 44, 44);
      }

      span {
        color: #014cee;
      }

      .navbar a {
        text-decoration: none;
        color: rgb(158, 43, 43);
        font-weight: 700;
        padding-left: 5px;
        padding-right: 5px;
      }

      .navbar a:hover {
        color: rgb(158, 43, 43);
        font-weight: 900;
        background-color: rgb(204, 159, 159);
      }

      @media (max-width: 300px) {
        body {
          background-color: rgb(91, 230, 91);
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <a href="" id="logo">Port<span>folio</span> </a>
      <nav class="navbar">
        <a href="" id="Home">Home</a>
        <a href="./About.html" id="About">About</a>
        <a href="" id="Portfolio">Portfolio</a>
        <a href="" id="Contact">Contact</a>
      </nav>
    </header>

    <p>Hello, This is My first Portfolio Website.</p>
